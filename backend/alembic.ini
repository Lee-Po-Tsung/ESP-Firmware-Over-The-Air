# Alembic configuration for the OTA backend.
# Run from the repo root, e.g.:  uv run alembic -c backend/alembic.ini upgrade head
[alembic]
# %(here)s resolves to this file's directory so commands work from anywhere.
script_location = %(here)s/alembic
prepend_sys_path = %(here)s
# The database URL is injected in env.py from backend/config.py — do not set it here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
